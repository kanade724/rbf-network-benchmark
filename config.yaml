paths:
  # This repository currently lives at SURF2026/src/rbf-network-benchmark.
  # ../.. resolves to the SURF2026 workspace root, where data and output live.
  workspace_root: ../..
  data_dir: data
  output_dir: output

download:
  datasets:
    - iris
    - wine
    - breast_cancer
    - fashion_mnist
  fashion_mnist:
    openml_name: Fashion-MNIST
    version: 1

experiment:
  datasets:
    #- iris
    #- wine
    #- breast_cancer
    #- fashion_mnist
    - optdigits
    - pendigits
  test_size: 0.25 # 25% test set, 75% training set
  random_state: 42 
  standardize: true
  fashion_mnist_pipeline:
    normalize_pixels: true
    pca_components: 200
  save_predictions: true
  save_confusion_matrix: true
  save_plots: true

gpu:
  device: auto
  batch_size: 2048
  eval_batch_size: 4096
  history_interval: 1

rbf:
  center_init: kmeans
  n_centers: 20
  sigma: auto
  sigma_scale: 1.0
  epochs: 150
  learning_rate: 0.05
  l2_alpha: 0.001
  solver: gd
  kmeans_max_iter: 300

dataset_overrides:
  iris:
    rbf:
      n_centers: 12 #特征维度 输出维度
      sigma: auto
      sigma_scale: 1.0
      epochs: 150
      learning_rate: 0.05
      l2_alpha: 0.001

  wine:
    rbf:
      n_centers: 30
      sigma: auto
      sigma_scale: 1.0
      epochs: 200
      learning_rate: 0.05
      l2_alpha: 0.01

  breast_cancer:
    rbf:
      n_centers: 40
      sigma: auto
      sigma_scale: 1.2
      epochs: 200
      learning_rate: 0.05
      l2_alpha: 0.01

  fashion_mnist:
    rbf:
      center_init: random
      n_centers: 6000
      sigma: auto
      sigma_scale: 0.35
      epochs: 400
      learning_rate: 0.02
      l2_alpha: 0.00001

  optdigits:
    rbf:
      n_centers: 20
      epochs: 2000
      learning_rate: 0.02
      sigma_scale: 0.8
      l2_alpha: 0.01
      solver: lbfgs

  pendigits:
    rbf:
      n_centers: 20
      epochs: 2000
      learning_rate: 0.02
      sigma_scale: 0.6
      l2_alpha: 0.01
      solver: lbfgs